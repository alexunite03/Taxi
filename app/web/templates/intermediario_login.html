{% extends "base.html" %}
{% block titulo %}Entrar — intermediario{% endblock %}
{% block contenido %}
<h1>Acceso de establecimientos</h1>
{% if error %}<p class="error" role="alert">{{ error }}</p>{% endif %}
<form method="post" action="/intermediario/login">
  <div class="campo">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required autocomplete="username">
  </div>
  <div class="campo">
    <label for="password">Contraseña</label>
    <input type="password" id="password" name="password" required autocomplete="current-password">
  </div>
  <button type="submit" class="principal">Entrar</button>
</form>
<p class="ayuda">¿Aún no tienes cuenta?
<a href="/registro/intermediario">Registra tu establecimiento</a>.</p>
{% endblock %}
